  .rays{position:absolute;inset:0;pointer-events:none;background:conic-gradient(from 90deg at 50% 0%,transparent 0deg,rgba(255,240,200,.35) 18deg,transparent 36deg,transparent 324deg,rgba(255,240,200,.35) 342deg,transparent 360deg);filter:blur(30px);opacity:.7}
  .hero-inner{position:relative;z-index:5;text-align:center;padding:0 24px}
  .kicker{font-family:'Dancing Script',cursive;color:#c86e6e;font-size:22px;margin-bottom:8px}
  h1.hero-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:56px;line-height:.95;letter-spacing:-.02em}
  h1.hero-title .big{display:block;font-size:96px;font-weight:600;margin:6px 0}
  h1.hero-title .name{display:block;font-family:'Dancing Script',cursive;font-weight:700;font-size:64px;background:linear-gradient(90deg,#c8994a,#e8bb6f,#c8994a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .scroll-hint{margin-top:44px;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:rgba(58,37,48,.5)}
  .scroll-hint .line{display:block;width:1px;height:38px;margin:8px auto 0;background:linear-gradient(to bottom,rgba(58,37,48,.5),transparent)}
  /* Scene */
  #scene{min-height:220vh;background:linear-gradient(180deg,rgba(251,241,230,.7),rgba(247,216,211,.4) 50%,#fbf1e6)}
  #scene .sticky{position:sticky;top:0;height:100svh;display:flex;align-items:center;justify-content:center}
  #cake{width:85vw;max-width:420px;filter:drop-shadow(0 40px 60px rgba(180,100,100,.35));will-change:transform;transform:translateZ(0)}
  #glow{position:absolute;left:50%;top:50%;width:70vh;height:70vh;transform:translate3d(-50%,-50%,0);border-radius:50%;background:radial-gradient(circle,rgba(255,235,190,.55) 0%,rgba(240,180,150,.25) 40%,transparent 70%);filter:blur(20px);pointer-events:none;will-change:transform,opacity}
  .balloon{position:absolute;width:56vw;max-width:280px;opacity:.9;pointer-events:none;will-change:transform;filter:drop-shadow(0 20px 40px rgba(200,120,120,.25))}
  #balL{left:-16vw;top:6vh}
  #balR{right:-18vw;top:22vh;transform:scaleX(-1)}
  #flowers{position:absolute;bottom:-6vh;left:50%;transform:translate3d(-50%,0,0);width:96vw;max-width:520px;pointer-events:none;z-index:3;filter:drop-shadow(0 20px 40px rgba(180,100,100,.35));will-change:transform}
  .moment{position:absolute;left:0;right:0;text-align:center;padding:0 24px;z-index:4;opacity:0;transform:translateY(30px);transition:opacity .8s ease,transform .8s ease}
  .moment.in{opacity:1;transform:translateY(0)}
  .moment.m1{top:66vh} .moment.m2{top:150vh}
  .moment p{font-family:'Dancing Script',cursive;color:#c86e6e;font-size:28px}
  .moment.m2 p{font-family:'Cormorant Garamond',serif;font-style:italic;color:rgba(58,37,48,.85);font-size:32px}
  /* Game */
  #game{padding:96px 24px;background:linear-gradient(180deg,#fbf1e6,rgba(247,216,211,.3) 50%,#fbf1e6);text-align:center;display:flex;flex-direction:column;align-items:center;gap:32px}
  #game h2{font-family:'Cormorant Garamond',serif;font-size:36px;margin-top:6px}
  .cake-holder{position:relative;width:100%;max-width:340px;height:240px;border-radius:28px;padding:28px 22px 20px;display:flex;justify-content:center;align-items:flex-end;gap:14px}
  .cake-base{position:absolute;left:22px;right:22px;bottom:22px;height:88px;border-radius:18px;background:linear-gradient(180deg,#f5cfd0,rgba(226,139,139,.75));box-shadow:inset 0 -8px 20px rgba(180,80,80,.35)}
  .candle{position:relative;z-index:1;margin-bottom:96px;display:flex;flex-direction:column;align-items:center;background:none;border:0;cursor:pointer;padding:0}
  .flame{position:relative;width:14px;height:28px}
  .flame .f{position:absolute;inset:0;border-radius:50%;background:radial-gradient(ellipse at 50% 80%,#fff7c0 0,#ffb56b 45%,#ff6b3d 80%,transparent 100%);box-shadow:0 0 18px #ffb56b,0 0 40px #ff8a3d,0 -8px 30px rgba(255,180,100,.6);animation:flicker .18s ease-in-out infinite;will-change:transform,opacity;transform:translateZ(0)}
  .candle.out .flame .f{opacity:0;transform:scale(0) translateY(-16px);transition:.4s}
  .candle .smoke{position:absolute;left:50%;top:0;width:22px;height:22px;transform:translate3d(-50%,0,0) scale(.5);border-radius:50%;background:rgba(255,255,255,.7);filter:blur(6px);opacity:0}
  .candle.out .smoke{animation:smoke 1.2s ease-out forwards}
  @keyframes smoke{0%{opacity:.7;transform:translate3d(-50%,0,0) scale(.5)}100%{opacity:0;transform:translate3d(-50%,-46px,0) scale(1.5)}}
  .wick{width:2px;height:5px;background:rgba(58,37,48,.7);margin-top:2px}
  .stick{margin-top:2px;width:10px;height:64px;border-radius:3px;box-shadow:0 4px 10px rgba(180,120,120,.35)}
  .status{font-size:13px;color:var(--muted)}
  .btn{border-radius:999px;padding:11px 22px;font-size:14px;font-weight:500;font-family:inherit;color:var(--ink);cursor:pointer;border:0}
  .btn.primary{background:rgba(255,255,255,.55);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.6)}
  .btn.ghost{background:transparent;border:1px solid rgba(217,178,106,.5)}
  .wish{margin-top:8px;padding:18px 28px;border-radius:24px;text-align:center;opacity:0;transform:scale(.85);transition:.6s cubic-bezier(.2,.9,.3,1.2)}
  .wish.in{opacity:1;transform:scale(1)}
  .wish p{font-family:'Dancing Script',cursive;font-size:28px}
  /* Letter */
  #letter{padding:96px 24px;background:linear-gradient(180deg,#faece0 0%,#f2d7cf 60%,#eec6c6 100%)}
  .card{position:relative;max-width:440px;margin:0 auto;padding:44px 32px;border-radius:32px}
  .tag{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.75);border:1px solid rgba(217,178,106,.4);padding:5px 14px;border-radius:999px;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(58,37,48,.6);backdrop-filter:blur(10px)}
  .card h2{font-family:'Dancing Script',cursive;font-size:40px;color:#c86e6e}
  .card .body{margin-top:22px;display:flex;flex-direction:column;gap:14px;font-family:'Cormorant Garamond',serif;font-size:19px;line-height:1.65;color:rgba(58,37,48,.88)}
  .card .close{margin-top:36px;text-align:center;font-family:'Dancing Script',cursive;font-size:26px}
  .card .sig{margin-top:24px;text-align:right;font-family:'Dancing Script',cursive;font-size:22px;color:rgba(226,139,139,.85)}
  /* Footer */
  footer{text-align:center;padding:36px;font-size:12px;color:rgba(58,37,48,.5)}
  footer .heart{color:var(--rose);margin:0 4px}
  /* Particles */
  .stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .stars span{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,230,190,.9);animation:twinkle 3s ease-in-out infinite;will-change:transform,opacity}
  /* Confetti */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
  #confetti span{position:absolute;top:-20px;width:8px;height:14px;border-radius:2px;will-change:transform,opacity}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media (min-width:640px){
    h1.hero-title{font-size:72px} h1.hero-title .big{font-size:120px} h1.hero-title .name{font-size:80px}
  }

  /* Cinematic background video + music additions */
  html,body{background:transparent!important}
  #bgVideo{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;z-index:-2;pointer-events:none;background:#1a0f14;transform:translate3d(0,0,0);will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden;contain:strict;image-rendering:optimizeSpeed}
  #bgVideo::-webkit-media-controls{display:none!important}
  #bgTint{position:fixed;inset:0;z-index:-1;pointer-events:none;background:linear-gradient(180deg,rgba(251,241,230,.35),rgba(247,216,211,.25) 50%,rgba(251,241,230,.45))}

<script>
(function(){
  var m=document.getElementById('bgMusic');
  var v=document.getElementById('bgVideo');
  m.volume=0.7; m.loop=true;
  // Ensure the video does NOT play on its own; scroll will drive it entirely
  v.muted=true; v.autoplay=false; v.removeAttribute('autoplay');
  try{ v.pause(); }catch(e){}

  // ---- Music: start instantly on first user interaction ----
  var musicStarted=false;
  function startMusic(){
    if(musicStarted) return;
    try{
      var p=m.play();
      if(p&&p.then){ p.then(function(){musicStarted=true;}).catch(function(){}); }
      else { musicStarted=true; }
    }catch(e){}
  }
  // Try immediately (in case autoplay is permitted); otherwise wait for first gesture
  startMusic();
  var kick=function(){ startMusic(); };
  var evts=['touchstart','pointerdown','click','scroll','wheel','keydown'];
  evts.forEach(function(ev){ window.addEventListener(ev,kick,{capture:true,passive:true}); });
  // Keep looping seamlessly
  m.addEventListener('ended', function(){ try{m.currentTime=0;}catch(e){} var p=m.play(); if(p&&p.catch)p.catch(function(){}); });

  // ---- Scroll-driven background video (perf-optimized) ----
  // Strategy:
  //  * Read scroll ONLY inside rAF (never in the scroll listener) — no layout thrash per event.
  //  * Cache scrollHeight/innerHeight; refresh on resize (not per frame).
  //  * Throttle seeks by WALL-CLOCK TIME (not by rAF tick) — this is the main lag fix.
  //    Seeking a video is expensive (often requires decoding back to the last keyframe),
  //    so doing it 60x/sec was overwhelming the decoder, especially on phones. We now cap
  //    how often a seek can be issued, and scale that cap down further on lower-power /
  //    touch devices.
  //  * No continuous "easing" loop — that was issuing extra seeks every frame even when
  //    scroll wasn't meaningfully changing. We just seek straight to the current target,
  //    throttled.
  //  * Issue at most one seek in-flight; coalesce; use fastSeek() when available.
  //  * Skip the rAF work entirely when nothing changed or the tab is hidden.
  var duration=0, targetTime=0, appliedTime=-1, metaReady=false, canDrive=false, seeking=false;
  var maxScroll=0, rafId=0, dirty=true, lastSeekAt=0;

  // Adaptive throttle: lower-power / touch devices get fewer seeks per second so the
  // decoder never falls behind and starts queuing up work (which reads as "lag").
  var isCoarsePointer = (function(){ try{ return matchMedia('(pointer:coarse)').matches; }catch(e){ return false; } })();
  var lowPower = (navigator.hardwareConcurrency||4) <= 4;
  var SEEK_INTERVAL = (isCoarsePointer||lowPower) ? 90 : 50; // ms between seeks (~11fps mobile, ~20fps desktop)
  var SEEK_EPS = 1/15; // below this time delta, don't bother — avoids sub-frame seek spam

  function measure(){
    maxScroll = Math.max(1, (document.documentElement.scrollHeight - window.innerHeight));
    dirty = true;
  }

  function onScroll(){ dirty = true; }

  function startLoop(){ if(!rafId) rafId = requestAnimationFrame(loop); }

  function onMeta(){
    if(metaReady) return;
    var d = v.duration;
    if(!d || !isFinite(d) || d<=0){ return setTimeout(onMeta, 60); }
    duration = d;
    metaReady = true;
    try{ v.pause(); v.currentTime=0; }catch(e){}
    measure();
    startLoop();
  }

  function onBuffered(){
    if(canDrive) return;
    canDrive = true;
    // Warm the decoder up by playing muted for an instant, then reset to 0.
    try{
      var p = v.play();
      if(p && p.then){ p.then(function(){ try{ v.pause(); v.currentTime=0; }catch(e){} }).catch(function(){}); }
      else { try{ v.pause(); v.currentTime=0; }catch(e){} }
    }catch(e){}
  }

  v.addEventListener('loadedmetadata', onMeta);
  v.addEventListener('durationchange', function(){ if(!metaReady) onMeta(); });
  v.addEventListener('canplay', onBuffered);
  v.addEventListener('canplaythrough', onBuffered);
  if(v.readyState>=1) onMeta();
  if(v.readyState>=3) onBuffered();

  // Don't block scrubbing forever — allow it after a short grace period regardless.
  setTimeout(onBuffered, 1500);

  // Keep the video paused at all times — scroll drives currentTime only.
  v.addEventListener('play', function(){ try{ v.pause(); }catch(e){} });
  v.addEventListener('seeked', function(){ seeking=false; });

  // Passive scroll — no work in the handler itself.
  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('resize', measure, {passive:true});
  window.addEventListener('orientationchange', measure, {passive:true});
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){
      if(rafId){ cancelAnimationFrame(rafId); rafId=0; }
    } else if(metaReady && !rafId){
      dirty = true;
      startLoop();
    }
  });

  function loop(){
    rafId = requestAnimationFrame(loop);
    if(!metaReady || !canDrive || seeking) return;

    if(dirty){
      var sT = window.pageYOffset || document.documentElement.scrollTop || 0;
      var p = sT / maxScroll;
      if(p<0) p=0; else if(p>1) p=1;

      dirty = false;
    }

    var now = performance.now();
    if(now - lastSeekAt < SEEK_INTERVAL) return;
    if(Math.abs(targetTime - appliedTime) < SEEK_EPS) return;

    var clamped = targetTime < 0 ? 0 : (targetTime > duration - 0.001 ? duration - 0.001 : targetTime);

    try{
      seeking = true;
      lastSeekAt = now;
      appliedTime = clamped;
      if(typeof v.fastSeek === 'function'){ v.fastSeek(clamped); }
      else { v.currentTime = clamped; }
    }catch(e){ seeking = false; }
  }
})();
